[graph]
all-features = true
no-default-features = false

[advisories]
version = 2
yanked = "deny"
ignore = [
    # rsa 0.9.x timing sidechannel via jsonwebtoken→octocrab; no patch available.
    # This is a local desktop app — not exposed as a server — so the risk is acceptable.
    "RUSTSEC-2023-0071",
]
unmaintained = "workspace"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { name = "openssl", reason = "use rustls; OpenSSL adds C build complexity" },
    { name = "openssl-sys", reason = "see openssl above" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
