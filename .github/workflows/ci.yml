name: ci

on:
  pull_request:
  push:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  CARGO_HUSKY_DONT_INSTALL_HOOKS: "1"
  RUST_BACKTRACE: short
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-lint
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  snapshot-suite:
    # HARDEN-01 D-24 — merge-blocking renderer snapshot gate.
    # Pitfall A: arm64 only — Intel runners produce flapping due to fp16 vs fp32.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-snapshot-suite
      - name: Run renderer snapshot tests
        env:
          INSTA_UPDATE: "no"
        run: cargo test -p vector-render-snapshots --tests --release
      - name: Upload .diff.png artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: crates/vector-render-snapshots/tests/goldens/*.diff.png
          if-no-files-found: ignore

  vt-conformance:
    # HARDEN-02 corpus — 8 scenarios driven against alacritty_terminal::Term.
    # Hard merge gate on macos-14 (arm64). No matrix; the parser is host-independent.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-vt-conformance
      - name: Run VT conformance corpus
        # --test vt_conformance (singular) selects the integration-test binary
        # so the corpus's 17 tests actually run. --tests + name filter would
        # filter to test fns named "vt_conformance" — there are none.
        run: cargo test -p vector-term --test vt_conformance --release

  perf-gate:
    # HARDEN-02 perf — idle CPU <1%, paste render at vsync cap.
    # D-23: macos-14 (arm64) is a HARD merge gate; macos-15-intel is ADVISORY
    # (continue-on-error) per Pitfall A — Intel runners flap due to fp16 vs fp32.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            cache-key: ci-perf-arm64
            advisory: false
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            cache-key: ci-perf-intel
            advisory: true
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.advisory }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache-key }}
      - name: Run perf probe
        run: |
          set -euo pipefail
          mkdir -p target
          cargo run --release -p vector-render --example perf_probe > target/perf.json
          cat target/perf.json
      - name: Enforce thresholds (arm64 only — D-23)
        if: matrix.advisory == false
        run: |
          set -euo pipefail
          IDLE=$(python3 -c "import json; print(json.load(open('target/perf.json'))['idle_cpu_pct'])")
          FPS=$(python3 -c "import json; print(json.load(open('target/perf.json'))['paste_render_fps'])")
          echo "idle_cpu_pct=$IDLE paste_render_fps=$FPS"
          python3 -c "import sys; idle=$IDLE; fps=$FPS; sys.exit(0 if (idle < 1.0 and fps >= 55.0) else 1)" || {
            echo "::error::Perf gate FAIL: idle=${IDLE}%% (<1.0 required) fps=${FPS} (>=55.0 required)"
            exit 1
          }
      - name: Record advisory result (intel — D-23)
        if: matrix.advisory == true
        run: |
          cat target/perf.json
          echo "::notice::macos-15-intel perf probe (advisory only — does not gate)"
      - uses: actions/upload-artifact@v4
        with:
          name: perf-probe-${{ matrix.runner }}
          path: target/perf.json
          if-no-files-found: warn

  cargo-geiger:
    # HARDEN-03 D-22 — unsafe-dep audit. cargo-deny has no [bans] unsafe knob;
    # cargo-geiger 0.13 --output-format Json + a JSON allowlist is the working
    # substitute. ubuntu-latest for the cold cache install of cargo-geiger.
    # Geiger requires running from a concrete package directory (the workspace
    # root is a virtual manifest); vector-app is the binary that pulls in the
    # whole dep tree so it's the canonical root for the audit.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-cargo-geiger
      - name: Install cargo-geiger
        run: cargo install cargo-geiger@0.13.0 --locked
      - name: Run cargo-geiger and compare against allowlist
        run: |
          set -euo pipefail
          mkdir -p target
          ( cd crates/vector-app && cargo geiger --output-format Json ) > target/geiger.json
          python3 .github/scripts/check-geiger.py cargo-geiger.json target/geiger.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: geiger-report
          path: target/geiger.json
          if-no-files-found: warn

  token-redaction-grep:
    # HARDEN-03 D-11 runtime gate. Complements the static gate at
    # vector-arch-tests/no_token_in_debug_or_log.rs (D-29). Runs both:
    # (1) the static gate (re-confirm green), and
    # (2) the runtime gate (wiremock-free in-memory tracing capture).
    # Then `grep -E` on the tee'd output as a belt-and-suspenders catch
    # in case the runtime assert is silently bypassed.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-token-redaction
      - name: Static gate — no_token_in_debug_or_log
        run: cargo test -p vector-arch-tests --test no_token_in_debug_or_log
      - name: Runtime grep gate — vector-codespaces
        run: |
          set -euo pipefail
          mkdir -p target
          cargo test -p vector-codespaces --test token_redaction_runtime -- --nocapture 2>&1 | tee target/auth-trace-codespaces.log
          # The fake-token literal `gho_FAKE_TOKEN_FOR_TESTING_*` is the
          # self-verifying fixture — strip it before grepping so any REAL-shaped
          # token still trips the gate. JWT prefix (eyJ...) is not used here.
          if grep -E '(gho_|ghp_|gha_|ghs_|eyJ[A-Za-z0-9_-]{10,})' target/auth-trace-codespaces.log | grep -v 'FAKE_TOKEN' | grep -v 'FAKE_REFRESH'; then
            echo "::error::Token-shaped string leaked in vector-codespaces tracing output"
            exit 1
          fi
      - name: Runtime grep gate — vector-tunnels
        run: |
          set -euo pipefail
          mkdir -p target
          cargo test -p vector-tunnels --test token_redaction_runtime -- --nocapture 2>&1 | tee target/auth-trace-tunnels.log
          if grep -E '(gho_|ghp_|gha_|ghs_|eyJ[A-Za-z0-9_-]{10,})' target/auth-trace-tunnels.log | grep -v 'FAKE_TOKEN'; then
            echo "::error::Token-shaped string leaked in vector-tunnels tracing output"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: auth-traces
          path: target/auth-trace-*.log
          if-no-files-found: ignore

  commitlint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install convco
        run: |
          set -euo pipefail
          curl -sSL https://github.com/convco/convco/releases/latest/download/convco-macos.zip -o /tmp/convco.zip
          unzip -o /tmp/convco.zip -d /tmp/convco
          chmod +x /tmp/convco/convco
          sudo mv /tmp/convco/convco /usr/local/bin/
      - name: Lint commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            convco check ${{ github.event.pull_request.base.sha }}..HEAD
          else
            # Tolerant on direct main pushes (allows early bootstrap commits).
            convco check HEAD~10..HEAD || true
          fi

  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test
      - name: Architecture-lint per-crate tests
        run: cargo test --workspace --tests
      - name: Architecture-lint grep redundancy (D-08)
        run: |
          set -e
          if rg -n --glob 'crates/**/*.rs' --glob '!crates/**/tests/no_tokio_main.rs' \
               '#\[tokio::main\]|Builder::new_current_thread\(\)' ; then
            echo "::error::Forbidden tokio pattern found in production code (D-08)."
            exit 1
          fi
      - name: Architecture-lint per-crate test file count
        run: |
          set -e
          tests_count=$(ls crates/*/tests/no_tokio_main.rs 2>/dev/null | wc -l)
          crates_count=$(ls -d crates/vector-* 2>/dev/null | wc -l)
          if [ "$tests_count" -ne "$crates_count" ]; then
            echo "::error::Per-crate architecture-lint test count ($tests_count) != crate count ($crates_count). New crate without tests/no_tokio_main.rs?"
            exit 1
          fi

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  # D-83 #4: cargo-machete catches unused workspace deps. Not branch-protection required.
  unused-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@v0.9.2

  # POLISH-05 automated half: real tmux 3.4+ DCS round-trip. Not branch-protection required.
  # continue-on-error: clipboard passthrough requires an interactive outer terminal;
  # detached CI sessions have nowhere to DCS-pass-through to, so pbpaste is always empty.
  tmux-smoke:
    needs: [test]
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-tmux-smoke
      - run: brew install tmux
      - run: cargo test -p vector-term --test osc52_tmux -- --ignored

  # Phase 9 PERSIST-04 live e2e: real Dev Tunnels relay + user-managed tmux on a
  # remote Linux box running `vector-tunnel-agent`. Not branch-protection required.
  # continue-on-error: requires VECTOR_E2E_TUNNEL_ID + VECTOR_E2E_MICROSOFT_TOKEN
  # repository secrets to be set; otherwise the tests #[ignore] themselves.
  persist-e2e:
    needs: [test]
    runs-on: macos-14
    continue-on-error: true
    env:
      VECTOR_E2E_TUNNEL_ID: ${{ secrets.VECTOR_E2E_TUNNEL_ID }}
      VECTOR_E2E_MICROSOFT_TOKEN: ${{ secrets.VECTOR_E2E_MICROSOFT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-persist-e2e
      - name: Skip when secrets absent
        if: env.VECTOR_E2E_TUNNEL_ID == '' || env.VECTOR_E2E_MICROSOFT_TOKEN == ''
        run: echo "VECTOR_E2E_* secrets unset; skipping live smoke test."
      - name: Run live e2e
        if: env.VECTOR_E2E_TUNNEL_ID != '' && env.VECTOR_E2E_MICROSOFT_TOKEN != ''
        run: cargo test -p vector-tunnels --test live_devtunnel_smoke -- --ignored --test-threads=1

  build-arm64:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: [lint, test, deny]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-arm64
      - run: cargo build --release --target aarch64-apple-darwin -p vector-app
      - uses: actions/upload-artifact@v4
        with:
          name: vector-aarch64
          path: target/aarch64-apple-darwin/release/vector-app

  build-x86_64:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: [lint, test, deny]
    runs-on: macos-15-intel    # AMENDMENT to D-21: previous Intel runner retired Dec 2025; macos-15-intel until Aug 2027.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-x86_64
      - run: cargo build --release --target x86_64-apple-darwin -p vector-app
      - uses: actions/upload-artifact@v4
        with:
          name: vector-x86_64
          path: target/x86_64-apple-darwin/release/vector-app

  package:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: [build-arm64, build-x86_64]
    runs-on: macos-14
    permissions:
      contents: write   # for tip release publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: vector-aarch64
          path: artifacts/aarch64
      - uses: actions/download-artifact@v4
        with:
          name: vector-x86_64
          path: artifacts/x86_64
      - name: Make per-arch binaries executable
        run: |
          chmod +x artifacts/aarch64/vector-app
          chmod +x artifacts/x86_64/vector-app
      - name: Pitfall-3 guard — verify per-arch Mach-O before merge
        run: |
          set -e
          file artifacts/aarch64/vector-app | grep -q 'arm64'
          file artifacts/x86_64/vector-app | grep -q 'x86_64'
      - name: Install build tools
        run: |
          brew install create-dmg librsvg
          cargo install cargo-bundle@0.10.0 --locked
      - name: Build Universal DMG via xtask
        run: |
          cargo xtask dmg --universal \
            --arm64 artifacts/aarch64/vector-app \
            --x86_64 artifacts/x86_64/vector-app
      - name: Pitfall-3 guard — verify bundled Mach-O is fat
        run: |
          set -e
          BIN="target/release/bundle/osx/Vector.app/Contents/MacOS/vector-app"
          INFO=$(lipo -info "$BIN")
          echo "$INFO"
          echo "$INFO" | grep -q 'x86_64'
          echo "$INFO" | grep -q 'arm64'
      - name: Upload Universal DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: vector-universal-dmg
          path: target/dmg/Vector-*-universal.dmg
          retention-days: 90
      - name: Publish tip release (overwrite)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Rename DMG to tip variant per D-28: Vector-{version}-tip-{shortsha}-universal.dmg
          for f in target/dmg/Vector-*-universal.dmg; do
            base=$(basename "$f" .dmg)
            mv "$f" "target/dmg/${base/-universal/-tip-${SHORT_SHA}-universal}.dmg"
          done
          gh release delete tip --yes --cleanup-tag || true
          NOW=$(date -u +'%Y-%m-%d %H:%M UTC')
          NOTES=$'Built from `'"${SHORT_SHA}"$'` on '"${NOW}"$'.\n\nAfter installing, run once:\n\n```sh\nxattr -dr com.apple.quarantine /Applications/Vector.app\n```\n'
          gh release create tip --prerelease --title "Tip build" \
            --notes "$NOTES" \
            target/dmg/Vector-*-tip-*-universal.dmg
